server {
    listen       80;
    listen  [::]:80;
    server_name  _;
    server_tokens off;

    # set_real_ip_from 172.31.0.0/16;
    # real_ip_header X-Forwarded-For;
    # real_ip_recursive on;

    client_max_body_size 350M;

    location = /api/v1/csp-report {
            client_max_body_size 16k;
            try_files $uri /index.php$is_args$args;
    }

    location / {
            index index.php;
            try_files $uri /index.php$is_args$args;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS, PUT, PATCH, DELETE, HEAD';
            add_header Access-Control-Max-Age 3600;
            add_header Access-Control-Allow-Credentials 'true';
            add_header Access-Control-Allow-Headers 'Origin,Content-Type,Accept,Authorization,central';

    }

    # pass the PHP scripts to FastCGI server from upstream phpfcgi
    location ~ ^/index\.php(/|$) {
            fastcgi_pass php:9000;
            fastcgi_split_path_info ^(.+\.php)(/.*)$;
            fastcgi_read_timeout 3600;
            include fastcgi_params;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT  /var/www/html/public;
            fastcgi_param HTTPS off;
            fastcgi_buffers 16 16k;
            fastcgi_buffer_size 32k;
            internal;
    }

    location ~* ^/(?!api/).*\.(svg|jpg|jpeg|png|gif|ico)$ {
            root       /var/www/;
            expires    max;
            add_header Access-Control-Allow-Origin *;
    }

    # return 404 for all other php files not matching the front controller
    # this prevents access to other php files you don't want to be accessible.
    location ~ \.php$ {
            return 404;
    }

    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
