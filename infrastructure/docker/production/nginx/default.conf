map $http_origin $cors_allow_origin {
    default                            "";
    "https://golifecraft.com"          "https://golifecraft.com";
    "https://www.golifecraft.com"      "https://www.golifecraft.com";
}

server {
    listen       80;
    listen  [::]:80;
    server_name  _;
    server_tokens off;

    client_max_body_size 100M;

    location = /api/v1/csp-report {
        client_max_body_size 16k;
        try_files $uri /index.php$is_args$args;
    }

    location / {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin      $cors_allow_origin always;
            add_header Vary                             Origin              always;
            add_header Access-Control-Allow-Credentials 'true'              always;
            add_header Access-Control-Allow-Methods     'GET, POST, OPTIONS, PUT, PATCH, DELETE, HEAD' always;
            add_header Access-Control-Allow-Headers     'Origin,Content-Type,Accept,Authorization,central' always;
            add_header Access-Control-Max-Age           3600                always;
            add_header Content-Length                   0                   always;
            add_header Content-Type                     'text/plain charset=UTF-8' always;
            return 204;
        }

        index index.php;
        try_files $uri /index.php$is_args$args;

        add_header X-Content-Type-Options           "nosniff"                          always;
        add_header X-Frame-Options                  "DENY"                             always;
        add_header Referrer-Policy                  "strict-origin-when-cross-origin"  always;
        add_header Access-Control-Allow-Origin      $cors_allow_origin                 always;
        add_header Vary                             Origin                             always;
        add_header Access-Control-Allow-Credentials 'true'                             always;
        add_header Access-Control-Allow-Methods     'GET, POST, OPTIONS, PUT, PATCH, DELETE, HEAD' always;
        add_header Access-Control-Allow-Headers     'Origin,Content-Type,Accept,Authorization,central' always;
        add_header Access-Control-Max-Age           3600                               always;
    }

    # Pass PHP scripts to FastCGI server
    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        fastcgi_read_timeout 60;
        include fastcgi_params;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT  /var/www/html/public;
        fastcgi_param HTTPS on;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        internal;
    }

    location ~* ^/(?!api/).*\.(svg|jpg|jpeg|png|gif|ico)$ {
        root       /var/www/;
        expires    max;
        add_header Access-Control-Allow-Origin $cors_allow_origin always;
        add_header Vary                        Origin             always;
        add_header Cache-Control               "public, immutable" always;
    }

    # Deny access to all other PHP files
    location ~ \.php$ {
        return 404;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    error_log /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;
}
