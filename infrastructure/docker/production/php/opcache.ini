[opcache]
; ─── OPcache Production Configuration ────────────────────────────────
; Fully enabled and optimized for production performance.

opcache.enable=1
opcache.enable_cli=0

; JIT disabled: tracing JIT segfaults (SIGSEGV) under Symfony/Doctrine and
; provides no measurable benefit on I/O-bound request handling.
opcache.jit=disable
opcache.jit_buffer_size=0

; Memory settings
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000

; Performance settings
opcache.max_wasted_percentage=5
opcache.use_cwd=1

; CRITICAL: Do NOT check file timestamps in production
; Files are baked into the image and never change at runtime
opcache.validate_timestamps=0
opcache.revalidate_freq=0

opcache.save_comments=1
opcache.fast_shutdown=1
opcache.enable_file_override=1

; Preloading (Symfony preload file)
opcache.preload=/var/www/html/config/preload.php
opcache.preload_user=www-data
