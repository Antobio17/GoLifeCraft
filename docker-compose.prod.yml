services:
  gateway:
    image: ghcr.io/antobio17/golifecraft-gateway-production:latest
    container_name: golifecraft_gateway
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      CERT_DOMAIN: ${CERT_DOMAIN:-golifecraft.com}
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - nginx
      - frontend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  certbot:
    image: certbot/certbot
    container_name: golifecraft_certbot
    depends_on:
      - gateway
    environment:
      CERT_DOMAIN: ${CERT_DOMAIN:-golifecraft.com}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL}
      CERTBOT_STAGING: ${CERTBOT_STAGING:-0}
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
      - ./infrastructure/docker/production/certbot/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  frontend:
    image: ghcr.io/antobio17/golifecraft-frontend-production:latest
    container_name: golifecraft_frontend
    restart: always
    ports:
      - "4200:80"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  nginx:
    image: ghcr.io/antobio17/golifecraft-nginx-production:latest
    container_name: golifecraft_nginx
    restart: always
    volumes:
      - ./volumes/public_uploads:/var/www/upload/
    ports:
      - "8083:80"
    depends_on:
      - php
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  php:
    image: ghcr.io/antobio17/golifecraft-php-production:latest
    container_name: golifecraft_php
    restart: always
    env_file:
      - .env.local
    volumes:
      - ./volumes/internal_uploads:/var/www/html/var/uploads
      - ./volumes/jwt_keys:/var/www/html/config/jwt
    depends_on:
      - db
      - postfix
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 512M
        reservations:
          cpus: '0.50'
          memory: 256M

  worker:
    image: ghcr.io/antobio17/golifecraft-php-production:latest
    container_name: golifecraft_worker
    profiles:
      - tools
    env_file:
      - .env.local
    volumes:
      - ./volumes/worker_logs:/var/log/worker
      - ./volumes/mercadona:/var/www/html/var/mercadona
    depends_on:
      - db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  postfix:
    image: boky/postfix:latest
    container_name: golifecraft_postfix
    restart: always
    environment:
      ALLOWED_SENDER_DOMAINS: "${MAIL_DOMAIN:-golifecraft.com}"
      HOSTNAME: "mail.${MAIL_DOMAIN:-golifecraft.com}"
      POSTFIX_smtp_tls_security_level: "may"
      POSTFIX_smtpd_tls_security_level: "none"
      POSTFIX_mynetworks: "127.0.0.0/8,172.42.0.0/16"
      POSTFIX_inet_protocols: "ipv4"
      DKIM_AUTOGENERATE: "1"
    volumes:
      - ./volumes/postfix_dkim:/etc/opendkim/keys
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.10'
          memory: 64M

  db:
    image: mysql:8.0.28
    container_name: golifecraft_mysql
    restart: always
    environment:
      MYSQL_ROOT_HOST: '%'
      MYSQL_ROOT_PASSWORD: ${DATABASE_MASTER_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_MASTER_NAME:-master}
    ports:
      - "3309:3306"
    volumes:
      - /var/lib/golifecraft-mysql-docker:/var/lib/mysql
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 1024M
        reservations:
          cpus: '0.50'
          memory: 512M

volumes:
  certbot_certs:
  certbot_www:

networks:
  default:
    name: golifecraft_network
    ipam:
      config:
        - subnet: 172.42.0.0/16
