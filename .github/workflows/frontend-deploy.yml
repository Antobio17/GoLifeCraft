name: 🚀 Frontend · Deploy to Production (SSH)

on:
  workflow_run:
    workflows: ["🐳 Frontend · Publish image (GHCR)"]
    types:
      - completed
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/golifecraft

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          source: docker-compose.prod.yml
          target: ${{ secrets.SERVER_PROJECT_PATH }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          script: |
            set -e

            echo "==> Bootstrapping project directory..."
            cd ${{ secrets.SERVER_PROJECT_PATH }}
            mkdir -p volumes/public_uploads volumes/internal_uploads volumes/jwt_keys

            echo "==> Writing .env.local from secrets..."
            cat > .env.local <<'GOLIFECRAFT_ENV_EOF'
            ${{ secrets.PROD_ENV_FILE }}
            GOLIFECRAFT_ENV_EOF
            chmod 600 .env.local

            echo "==> Logging in to GitHub Container Registry..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            echo "==> Pulling latest images..."
            docker compose --env-file .env.local -f docker-compose.prod.yml pull frontend

            echo "==> Restarting updated services..."
            docker compose --env-file .env.local -f docker-compose.prod.yml up -d --no-deps --remove-orphans frontend

            echo "==> Cleaning up old images..."
            docker image prune -f

            echo "==> Deploy completed successfully!"

      - name: Deployment status
        if: failure()
        run: echo "::error::Deployment to production server failed!"
