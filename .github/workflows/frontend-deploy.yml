name: Frontend - Deploy to Production Server

on:
  workflow_run:
    workflows: ["Frontend - Build and Push Docker Images"]
    types:
      - completed
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/golifecraft

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          script: |
            set -e

            echo "==> Logging in to GitHub Container Registry..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            echo "==> Navigating to project directory..."
            cd ${{ secrets.SERVER_PROJECT_PATH }}

            echo "==> Pulling latest images..."
            docker compose -f docker-compose.prod.yml pull frontend

            echo "==> Restarting updated services..."
            docker compose -f docker-compose.prod.yml up -d --no-deps --remove-orphans frontend

            echo "==> Cleaning up old images..."
            docker image prune -f

            echo "==> Deploy completed successfully!"

      - name: Deployment status
        if: failure()
        run: echo "::error::Deployment to production server failed!"
