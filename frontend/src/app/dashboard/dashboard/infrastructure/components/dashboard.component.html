<ds-dashboard-layout>
  <ds-greeting-header
    slot="header"
    [date]="today | date: 'EEEE, d MMM'"
    [greeting]="'dashboard.greeting' | t"
    [name]="name()"
    [initial]="initial()"
    [avatarLabel]="'dashboard.avatar.settings' | t"
    (avatarClick)="goToSettings()"
  />

  <ds-stack slot="summary" [gap]="'10px'">
    <ds-section-header
      [title]="'dashboard.summary.title' | t"
      [actionLabel]="'dashboard.summary.more' | t"
      (action)="comingSoon()"
    />
    <ds-daily-summary
      [progressPercent]="progressPercent"
      [consumedKcal]="summary.consumedKcal | number: '1.0-0' : 'es'"
      [targetKcal]="summary.targetKcal | number: '1.0-0' : 'es'"
      [kcalLabel]="'dashboard.summary.kcal' | t"
      [macros]="[
        {
          label: 'dashboard.macros.protein' | t,
          value: summary.proteinG + ' g',
          tone: 'protein',
        },
        {
          label: 'dashboard.macros.fat' | t,
          value: summary.fatG + ' g',
          tone: 'fat',
        },
        {
          label: 'dashboard.macros.carbs' | t,
          value: summary.carbsG + ' g',
          tone: 'carbs',
        },
      ]"
    />
  </ds-stack>

  <app-gym-analytics
    slot="gym"
    [stats]="gymStats()"
    [loading]="gymStatsLoading()"
    (seeAll)="goToGym()"
  />

  <ds-stack slot="explore" [gap]="'11px'">
    <ds-section-header
      [title]="'dashboard.explore.title' | t"
      [staticLabel]="'dashboard.explore.quickAccess' | t"
    />
    <ds-grid [columns]="2" [gap]="'10px'">
      <ds-action-tile
        icon="leaf"
        [name]="'dashboard.explore.catalog' | t"
        [meta]="'dashboard.explore.catalogMeta' | t"
        (clicked)="goToCatalog()"
      />
      <ds-action-tile
        icon="dumbbell"
        [name]="'dashboard.explore.gym' | t"
        [meta]="'dashboard.explore.gymMeta' | t"
        (clicked)="goToGym()"
      />
      <ds-action-tile
        icon="bookmark"
        [name]="'dashboard.explore.recipes' | t"
        [meta]="'dashboard.explore.recipesMeta' | t"
        (clicked)="goToRecipes()"
      />
      <ds-action-tile
        icon="list"
        [soon]="true"
        [soonLabel]="'dashboard.explore.soonBadge' | t"
        [name]="'dashboard.explore.list' | t"
        [meta]="'dashboard.explore.soon' | t"
        (clicked)="comingSoon()"
      />
    </ds-grid>
  </ds-stack>
</ds-dashboard-layout>
