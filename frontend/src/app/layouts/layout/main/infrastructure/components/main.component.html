<div class="app-container">
  <app-floating-toast></app-floating-toast>

  @if (showNavbar) {
    <app-navbar [username]="username()" (logoutClick)="onLogout()"></app-navbar>

    @if (!breadcrumbService.hidden()) {
      <app-breadcrumbs
        [breadcrumbs]="breadcrumbs()"
        (navigate)="handleBreadcrumbNavigation($event)"
      ></app-breadcrumbs>
    }
  }

  <div class="content">
    <router-outlet></router-outlet>
  </div>
</div>
