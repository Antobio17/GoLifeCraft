<div class="drawer-root" [class.is-open]="isOpen()">
  <button
    type="button"
    class="drawer-scrim"
    [attr.tabindex]="isOpen() ? 0 : -1"
    [attr.aria-label]="'navbar.closeMenu' | t"
    (click)="close()"
  ></button>

  <aside
    class="drawer"
    role="dialog"
    aria-modal="true"
    [attr.aria-hidden]="!isInteractive()"
    [attr.inert]="isInteractive() ? null : ''"
  >
    <header class="drawer__header">
      <ds-brand-logo [markSize]="34" [wordmarkSize]="17"></ds-brand-logo>

      <ds-icon-button
        class="drawer__close"
        icon="close"
        variant="soft"
        [size]="30"
        [iconSize]="15"
        [stroke]="2.4"
        [radius]="'9px'"
        [ariaLabel]="'navbar.closeMenu' | t"
        (clicked)="close()"
      />
    </header>

    <nav class="drawer__nav" [attr.aria-label]="'navbar.openMenu' | t">
      <ds-nav-item
        routerLink="/dashboard"
        routerLinkActive="is-active"
        icon="home"
        [label]="'navbar.home' | t"
        (click)="close()"
      />
      <ds-nav-item
        routerLink="/catalog"
        routerLinkActive="is-active"
        icon="leaf"
        [label]="'navbar.catalog' | t"
        (click)="close()"
      />
      <ds-nav-item
        icon="bookmark"
        [label]="'navbar.recipes' | t"
        (click)="comingSoon()"
      />
      <ds-nav-item
        icon="list"
        [label]="'navbar.list' | t"
        (click)="comingSoon()"
      />
      <ds-nav-item
        routerLink="/gym"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: true }"
        icon="dumbbell"
        [label]="'navbar.gym' | t"
        (click)="close()"
      />
      <ds-nav-item
        routerLink="/gym/history"
        routerLinkActive="is-active"
        [sub]="true"
        icon="history"
        [label]="'navbar.history' | t"
        (click)="close()"
      />
      @if (isGod()) {
        <ds-nav-item
          routerLink="/users"
          routerLinkActive="is-active"
          icon="users"
          [label]="'navbar.users' | t"
          (click)="close()"
        />
      }
      <ds-nav-item
        icon="settings"
        [label]="'navbar.settings' | t"
        (click)="comingSoon()"
      />
    </nav>

    <button
      type="button"
      class="drawer__theme"
      role="switch"
      [attr.aria-checked]="isDark()"
      (click)="toggleTheme()"
    >
      <ds-icon
        class="drawer__theme-icon"
        [class.drawer__theme-icon--moon]="isDark()"
        [class.drawer__theme-icon--sun]="!isDark()"
        [name]="isDark() ? 'moon' : 'sun'"
        [size]="18"
        [stroke]="2.1"
      />
      <span class="drawer__theme-label">{{ "navbar.darkMode" | t }}</span>
      <span class="drawer__switch" [class.is-on]="isDark()">
        <span class="drawer__switch-knob"></span>
      </span>
    </button>

    <a class="drawer__user" routerLink="/me" (click)="close()">
      <ds-avatar [initial]="initial()" />
      <span class="drawer__user-text">
        <span class="drawer__user-name">{{ displayName() }}</span>
        <span class="drawer__user-email">{{ email() }}</span>
      </span>
    </a>

    <button type="button" class="drawer__logout" (click)="logout()">
      <ds-icon name="logout" [size]="17" [stroke]="2.2" />
      <span>{{ "navbar.logout" | t }}</span>
    </button>
  </aside>
</div>
