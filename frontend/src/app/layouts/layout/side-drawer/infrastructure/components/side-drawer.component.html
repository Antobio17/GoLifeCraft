<div class="drawer-root" [class.is-open]="isOpen()">
  <button
    type="button"
    class="drawer-scrim"
    [attr.tabindex]="isOpen() ? 0 : -1"
    [attr.aria-label]="'navbar.closeMenu' | t"
    (click)="close()"
  ></button>

  <aside
    class="drawer"
    role="dialog"
    aria-modal="true"
    [attr.aria-hidden]="!isInteractive()"
    [attr.inert]="isInteractive() ? null : ''"
  >
    <header class="drawer__header">
      <div class="drawer__brand">
        <span class="drawer__mark">
          <svg
            width="24"
            height="24"
            viewBox="0 0 100 100"
            fill="none"
            aria-hidden="true"
          >
            <path
              d="M50 21 A29 29 0 1 0 79 50 L63 50"
              stroke="currentColor"
              stroke-width="12"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M54 43 C54 32 62 25 73 25 C73 36 65 43 54 43 Z"
              fill="currentColor"
            />
          </svg>
        </span>
        <span class="drawer__wordmark"
          >Go<span class="drawer__wordmark-accent">Life</span>Craft</span
        >
      </div>

      <button
        type="button"
        class="drawer__close"
        (click)="close()"
        [attr.aria-label]="'navbar.closeMenu' | t"
      >
        <svg
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.4"
          aria-hidden="true"
        >
          <path d="M6 6l12 12M18 6L6 18" />
        </svg>
      </button>
    </header>

    <nav class="drawer__nav" [attr.aria-label]="'navbar.openMenu' | t">
      <a
        class="drawer__item"
        routerLink="/dashboard"
        routerLinkActive="is-active"
        (click)="close()"
      >
        <svg
          class="drawer__item-icon"
          width="19"
          height="19"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.2"
          aria-hidden="true"
        >
          <path d="M3 11l9-7 9 7v9a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z" />
        </svg>
        <span class="drawer__item-label">{{ "navbar.home" | t }}</span>
      </a>

      <button type="button" class="drawer__item" (click)="comingSoon()">
        <svg
          class="drawer__item-icon"
          width="19"
          height="19"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.1"
          aria-hidden="true"
        >
          <rect x="3" y="3" width="8" height="8" rx="2" />
          <rect x="13" y="3" width="8" height="8" rx="2" />
          <rect x="3" y="13" width="8" height="8" rx="2" />
          <rect x="13" y="13" width="8" height="8" rx="2" />
        </svg>
        <span class="drawer__item-label">{{ "navbar.catalog" | t }}</span>
      </button>

      <button type="button" class="drawer__item" (click)="comingSoon()">
        <svg
          class="drawer__item-icon"
          width="19"
          height="19"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.1"
          aria-hidden="true"
        >
          <path d="M4 4h13a2 2 0 0 1 2 2v14l-8-3.5L3 20V5a1 1 0 0 1 1-1z" />
        </svg>
        <span class="drawer__item-label">{{ "navbar.recipes" | t }}</span>
      </button>

      <button type="button" class="drawer__item" (click)="comingSoon()">
        <svg
          class="drawer__item-icon"
          width="19"
          height="19"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.1"
          aria-hidden="true"
        >
          <circle cx="9" cy="20" r="1.6" />
          <circle cx="18" cy="20" r="1.6" />
          <path
            d="M2 3h3l2.5 12.5a1.5 1.5 0 0 0 1.5 1.2h8.2a1.5 1.5 0 0 0 1.5-1.2L21 7H6"
          />
        </svg>
        <span class="drawer__item-label">{{ "navbar.list" | t }}</span>
      </button>

      <a
        class="drawer__item"
        routerLink="/gym"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="close()"
      >
        <svg
          class="drawer__item-icon"
          width="19"
          height="19"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.1"
          aria-hidden="true"
        >
          <path d="M6.5 6.5v11M17.5 6.5v11M3 9.5v5M21 9.5v5M6.5 12h11" />
        </svg>
        <span class="drawer__item-label">{{ "navbar.gym" | t }}</span>
      </a>

      <a
        class="drawer__item drawer__item--sub"
        routerLink="/gym/history"
        routerLinkActive="is-active"
        (click)="close()"
      >
        <svg
          class="drawer__item-icon"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.1"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M3 3v5h5" />
          <path d="M3.05 13A9 9 0 1 0 6 5.3L3 8" />
          <path d="M12 7v5l3 2" />
        </svg>
        <span class="drawer__item-label">{{ "navbar.history" | t }}</span>
      </a>

      @if (isGod()) {
        <a
          class="drawer__item"
          routerLink="/users"
          routerLinkActive="is-active"
          (click)="close()"
        >
          <svg
            class="drawer__item-icon"
            width="19"
            height="19"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.1"
            aria-hidden="true"
          >
            <circle cx="9" cy="8" r="3.4" />
            <path d="M2.5 19.5c0-3.2 2.6-4.8 6.5-4.8s6.5 1.6 6.5 4.8" />
            <path d="M16 5.2a3.2 3.2 0 0 1 0 6M18 19.5c0-2.4-1-4-3-4.6" />
          </svg>
          <span class="drawer__item-label">{{ "navbar.users" | t }}</span>
        </a>
      }

      <button type="button" class="drawer__item" (click)="comingSoon()">
        <svg
          class="drawer__item-icon"
          width="19"
          height="19"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.1"
          aria-hidden="true"
        >
          <circle cx="12" cy="12" r="3.2" />
          <path
            d="M19.4 13.5a7.5 7.5 0 0 0 0-3l1.7-1.3-1.8-3.1-2 .8a7.6 7.6 0 0 0-2.6-1.5l-.3-2.1h-3.6l-.3 2.1a7.6 7.6 0 0 0-2.6 1.5l-2-.8-1.8 3.1 1.7 1.3a7.5 7.5 0 0 0 0 3l-1.7 1.3 1.8 3.1 2-.8a7.6 7.6 0 0 0 2.6 1.5l.3 2.1h3.6l.3-2.1a7.6 7.6 0 0 0 2.6-1.5l2 .8 1.8-3.1z"
          />
        </svg>
        <span class="drawer__item-label">{{ "navbar.settings" | t }}</span>
      </button>
    </nav>

    <button
      type="button"
      class="drawer__theme"
      role="switch"
      [attr.aria-checked]="isDark()"
      (click)="toggleTheme()"
    >
      @if (isDark()) {
        <svg
          class="drawer__theme-icon drawer__theme-icon--moon"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.1"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.6 6.6 0 0 0 9.8 9.8z" />
        </svg>
      } @else {
        <svg
          class="drawer__theme-icon drawer__theme-icon--sun"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.1"
          stroke-linecap="round"
          aria-hidden="true"
        >
          <circle cx="12" cy="12" r="4.2" />
          <path
            d="M12 2.5v2M12 19.5v2M2.5 12h2M19.5 12h2M5.2 5.2l1.4 1.4M17.4 17.4l1.4 1.4M18.8 5.2l-1.4 1.4M6.6 17.4l-1.4 1.4"
          />
        </svg>
      }
      <span class="drawer__theme-label">{{ "navbar.darkMode" | t }}</span>
      <span class="drawer__switch" [class.is-on]="isDark()">
        <span class="drawer__switch-knob"></span>
      </span>
    </button>

    <a class="drawer__user" routerLink="/me" (click)="close()">
      <span class="drawer__avatar">{{ initial() }}</span>
      <span class="drawer__user-text">
        <span class="drawer__user-name">{{ displayName() }}</span>
        <span class="drawer__user-email">{{ email() }}</span>
      </span>
    </a>

    <button type="button" class="drawer__logout" (click)="logout()">
      <svg
        width="17"
        height="17"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M15 12H4M8 8l-4 4 4 4" />
        <path d="M14 4h4a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-4" />
      </svg>
      <span>{{ "navbar.logout" | t }}</span>
    </button>
  </aside>
</div>
