<nav
  class="tabbar"
  aria-label="Principal"
  [class.tabbar--drawer-open]="isDrawerOpen()"
>
  <ds-tab-item
    routerLink="/dashboard"
    routerLinkActive
    #homeActive="routerLinkActive"
    icon="home"
    [label]="'navbar.home' | t"
    [active]="homeActive.isActive && !isDrawerOpen()"
    [attr.aria-label]="'navbar.home' | t"
  />

  <ds-tab-item
    routerLink="/diary"
    routerLinkActive
    #diaryActive="routerLinkActive"
    icon="diary"
    [label]="'navbar.diary' | t"
    [active]="diaryActive.isActive && !isDrawerOpen()"
    [attr.aria-label]="'navbar.diary' | t"
  />

  <ds-tab-item
    routerLink="/catalog"
    routerLinkActive
    #catalogActive="routerLinkActive"
    icon="leaf"
    [label]="'navbar.catalog' | t"
    [active]="catalogActive.isActive && !isDrawerOpen()"
    [attr.aria-label]="'navbar.catalog' | t"
  />

  <ds-tab-item
    routerLink="/recipes"
    routerLinkActive
    #recipesActive="routerLinkActive"
    icon="chefHat"
    [label]="'navbar.recipes' | t"
    [active]="recipesActive.isActive && !isDrawerOpen()"
    [attr.aria-label]="'navbar.recipes' | t"
  />

  <ds-tab-item
    routerLink="/gym"
    routerLinkActive
    #gymActive="routerLinkActive"
    icon="dumbbell"
    [label]="'navbar.gym' | t"
    [active]="gymActive.isActive && !isDrawerOpen()"
    [attr.aria-label]="'navbar.gym' | t"
  />

  <ds-tab-item
    icon="menu"
    [label]="'navbar.menu' | t"
    [active]="isDrawerOpen()"
    [attr.aria-label]="'navbar.openMenu' | t"
    (click)="toggleDrawer()"
  />
</nav>
