<nav
  class="tabbar"
  aria-label="Principal"
  [class.tabbar--drawer-open]="isDrawerOpen()"
>
  <a
    class="tabbar__item"
    routerLink="/dashboard"
    routerLinkActive="tabbar__item--active"
    [attr.aria-label]="'navbar.home' | t"
  >
    <span class="tabbar__icon">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.2"
      >
        <path d="M3 11l9-7 9 7v9a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z" />
      </svg>
    </span>
    <span class="tabbar__label">{{ "navbar.home" | t }}</span>
  </a>

  <a
    class="tabbar__item"
    routerLink="/catalog"
    routerLinkActive="tabbar__item--active"
    [attr.aria-label]="'navbar.catalog' | t"
  >
    <span class="tabbar__icon">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.1"
      >
        <rect x="3" y="3" width="8" height="8" rx="2" />
        <rect x="13" y="3" width="8" height="8" rx="2" />
        <rect x="3" y="13" width="8" height="8" rx="2" />
        <rect x="13" y="13" width="8" height="8" rx="2" />
      </svg>
    </span>
    <span class="tabbar__label">{{ "navbar.catalog" | t }}</span>
  </a>

  <a
    class="tabbar__item"
    routerLink="/gym"
    routerLinkActive="tabbar__item--active"
    [attr.aria-label]="'navbar.gym' | t"
  >
    <span class="tabbar__icon">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.1"
      >
        <path d="M6.5 6.5v11M17.5 6.5v11M3 9.5v5M21 9.5v5M6.5 12h11" />
      </svg>
    </span>
    <span class="tabbar__label">{{ "navbar.gym" | t }}</span>
  </a>

  <button
    type="button"
    class="tabbar__item"
    [class.tabbar__item--active]="isDrawerOpen()"
    (click)="toggleDrawer()"
    [attr.aria-label]="'navbar.openMenu' | t"
  >
    <span class="tabbar__icon">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.2"
        stroke-linecap="round"
      >
        <path d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </span>
    <span class="tabbar__label">{{ "navbar.menu" | t }}</span>
  </button>
</nav>
