<ds-auth-card
  [tabs]="[
    { key: 'signin', label: 'register.tabs.signin' | t },
    { key: 'register', label: 'register.tabs.register' | t },
  ]"
  activeTab="register"
  [tagline]="'register.tagline' | t"
  (tabSelected)="onTab($event)"
>
  <form (ngSubmit)="onSubmit()">
    <ds-stack [gap]="'13px'">
      <ds-field [label]="'register.name.label' | t">
        <ds-text-input
          name="name"
          leadingIcon="user"
          autocomplete="given-name"
          [placeholder]="'register.name.placeholder' | t"
          [(ngModel)]="name"
          [disabled]="loading"
        />
      </ds-field>

      <ds-field [label]="'register.lastname.label' | t">
        <ds-text-input
          name="lastname"
          leadingIcon="user"
          autocomplete="family-name"
          [placeholder]="'register.lastname.placeholder' | t"
          [(ngModel)]="lastname"
          [disabled]="loading"
        />
      </ds-field>

      <ds-field [label]="'register.email.label' | t">
        <ds-text-input
          name="email"
          type="email"
          leadingIcon="mail"
          inputmode="email"
          autocomplete="email"
          [placeholder]="'register.email.placeholder' | t"
          [(ngModel)]="email"
          [disabled]="loading"
        />
      </ds-field>

      <ds-field [label]="'register.password.label' | t">
        <ds-text-input
          name="password"
          leadingIcon="lock"
          autocomplete="new-password"
          [passwordToggle]="true"
          [togglePasswordLabel]="'register.togglePassword.show' | t"
          [placeholder]="'register.password.placeholder' | t"
          [(ngModel)]="password"
          [disabled]="loading"
        />
      </ds-field>

      <ds-field [label]="'register.confirmPassword.label' | t">
        <ds-text-input
          name="confirmPassword"
          leadingIcon="lock"
          autocomplete="new-password"
          [passwordToggle]="true"
          [togglePasswordLabel]="'register.togglePassword.show' | t"
          [placeholder]="'register.confirmPassword.placeholder' | t"
          [(ngModel)]="confirmPassword"
          [disabled]="loading"
        />
      </ds-field>

      <ds-button
        type="submit"
        variant="primary"
        size="lg"
        [fullWidth]="true"
        [loading]="loading"
        [trailingIcon]="loading ? undefined : 'arrowRight'"
      >
        {{ (loading ? "register.submitting" : "register.submit") | t }}
      </ds-button>
    </ds-stack>
  </form>
</ds-auth-card>
