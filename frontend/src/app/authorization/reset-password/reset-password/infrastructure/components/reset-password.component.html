<ds-auth-card [tagline]="'resetPassword.tagline' | t">
  <form (ngSubmit)="onSubmit()">
    <ds-stack [gap]="'13px'">
      <ds-text variant="muted">{{ "resetPassword.intro" | t }}</ds-text>

      <ds-field [label]="'resetPassword.password.label' | t">
        <ds-text-input
          name="password"
          leadingIcon="lock"
          autocomplete="new-password"
          [passwordToggle]="true"
          [togglePasswordLabel]="'resetPassword.togglePassword.show' | t"
          [placeholder]="'resetPassword.password.placeholder' | t"
          [(ngModel)]="password"
          [disabled]="loading"
        />
        <ds-password-strength
          [password]="password"
          [weakLabel]="'resetPassword.strength.weak' | t"
          [mediumLabel]="'resetPassword.strength.medium' | t"
          [strongLabel]="'resetPassword.strength.strong' | t"
        />
      </ds-field>

      <ds-field [label]="'resetPassword.confirmPassword.label' | t">
        <ds-text-input
          name="confirmPassword"
          leadingIcon="lock"
          autocomplete="new-password"
          [passwordToggle]="true"
          [togglePasswordLabel]="'resetPassword.togglePassword.show' | t"
          [placeholder]="'resetPassword.confirmPassword.placeholder' | t"
          [(ngModel)]="confirmPassword"
          [disabled]="loading"
        />
      </ds-field>

      <ds-button
        type="submit"
        variant="primary"
        size="lg"
        [fullWidth]="true"
        [loading]="loading"
        [trailingIcon]="loading ? undefined : 'arrowRight'"
      >
        {{
          (loading ? "resetPassword.submitting" : "resetPassword.submit") | t
        }}
      </ds-button>

      <ds-stack direction="row" justify="center">
        <ds-button variant="link" (clicked)="onBackToLogin()">
          {{ "resetPassword.backToLogin" | t }}
        </ds-button>
      </ds-stack>
    </ds-stack>
  </form>
</ds-auth-card>
