<ds-auth-card [tagline]="'forgotPassword.tagline' | t">
  @if (submitted) {
    <ds-stack [gap]="'16px'">
      <p class="forgot__sent">{{ "forgotPassword.sent" | t }}</p>
      <ds-button
        variant="primary"
        size="lg"
        [fullWidth]="true"
        (clicked)="onBackToLogin()"
      >
        {{ "forgotPassword.backToLogin" | t }}
      </ds-button>
    </ds-stack>
  } @else {
    <form (ngSubmit)="onSubmit()">
      <ds-stack [gap]="'13px'">
        <p class="forgot__intro">{{ "forgotPassword.intro" | t }}</p>

        <ds-field [label]="'forgotPassword.email.label' | t">
          <ds-text-input
            name="email"
            type="email"
            leadingIcon="mail"
            inputmode="email"
            autocomplete="email"
            [placeholder]="'forgotPassword.email.placeholder' | t"
            [(ngModel)]="email"
            [disabled]="loading"
          />
        </ds-field>

        <ds-button
          type="submit"
          variant="primary"
          size="lg"
          [fullWidth]="true"
          [loading]="loading"
          [trailingIcon]="loading ? undefined : 'arrowRight'"
        >
          {{
            (loading ? "forgotPassword.submitting" : "forgotPassword.submit")
              | t
          }}
        </ds-button>

        <ds-stack direction="row" justify="center">
          <ds-button variant="link" (clicked)="onBackToLogin()">
            {{ "forgotPassword.backToLogin" | t }}
          </ds-button>
        </ds-stack>
      </ds-stack>
    </form>
  }
</ds-auth-card>
