<ds-auth-card [tagline]="'verifyEmail.tagline' | t">
  <ds-stack [gap]="'16px'">
    @if (status === "verifying") {
      <ds-text align="center">{{ "verifyEmail.verifying" | t }}</ds-text>
    }

    @if (status === "success") {
      <ds-text variant="success" align="center">
        {{ "verifyEmail.success" | t }}
      </ds-text>
      <ds-button
        variant="primary"
        size="lg"
        [fullWidth]="true"
        (clicked)="onBackToLogin()"
      >
        {{ "verifyEmail.goToLogin" | t }}
      </ds-button>
    }

    @if (status === "error") {
      <ds-text variant="danger" align="center">
        {{ "verifyEmail.error" | t }}
      </ds-text>
      <ds-button
        variant="primary"
        size="lg"
        [fullWidth]="true"
        (clicked)="onBackToLogin()"
      >
        {{ "verifyEmail.goToLogin" | t }}
      </ds-button>
    }
  </ds-stack>
</ds-auth-card>
