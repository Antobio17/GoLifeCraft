<div class="auth">
  <div class="auth__card">
    <div class="auth__brand">
      <app-brand-logo
        [markSize]="58"
        [wordmarkSize]="23"
        [stacked]="true"
        [tagline]="'login.tagline' | t"
      ></app-brand-logo>
    </div>

    <div class="auth__tabs" role="tablist">
      <button type="button" class="auth__tab auth__tab--active" role="tab">
        {{ "login.tabs.signin" | t }}
      </button>
      <button type="button" class="auth__tab" role="tab" (click)="onRegister()">
        {{ "login.tabs.register" | t }}
      </button>
    </div>

    <form (ngSubmit)="onSubmit()" class="auth__form">
      <label class="field" for="username">
        <span class="field__label">{{ "login.username.label" | t }}</span>
        <span class="field__control">
          <svg
            class="field__icon"
            width="17"
            height="17"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="8" r="4" />
            <path d="M4 20c0-4 3.58-7 8-7s8 3 8 7" stroke-linecap="round" />
          </svg>
          <input
            type="text"
            id="username"
            name="username"
            [(ngModel)]="username"
            [disabled]="loading"
            [placeholder]="'login.username.placeholder' | t"
            required
            autocomplete="username"
          />
        </span>
      </label>

      <label class="field" for="password">
        <span class="field__label">{{ "login.password.label" | t }}</span>
        <span class="field__control">
          <svg
            class="field__icon"
            width="17"
            height="17"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="4" y="10" width="16" height="10" rx="2.5" />
            <path d="M8 10V7a4 4 0 0 1 8 0v3" />
          </svg>
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            name="password"
            [(ngModel)]="password"
            [disabled]="loading"
            [placeholder]="'login.password.placeholder' | t"
            required
            autocomplete="current-password"
          />
          <button
            type="button"
            class="field__toggle"
            (click)="toggleShowPassword()"
            tabindex="-1"
            [attr.aria-label]="
              (showPassword
                ? 'login.togglePassword.hide'
                : 'login.togglePassword.show'
              ) | t
            "
          >
            @if (!showPassword) {
              <svg
                width="17"
                height="17"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" />
                <circle cx="12" cy="12" r="2.6" />
              </svg>
            }
            @if (showPassword) {
              <svg
                width="17"
                height="17"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              >
                <path
                  d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
                />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            }
          </button>
        </span>
      </label>

      <a href="#" class="auth__forgot" (click)="$event.preventDefault()">
        {{ "login.forgotPassword" | t }}
      </a>

      <button type="submit" class="auth__submit" [disabled]="loading">
        @if (!loading) {
          <span>{{ "login.submit" | t }}</span>
          <span class="auth__arrow" aria-hidden="true">→</span>
        }
        @if (loading) {
          <span class="auth__spinner" aria-hidden="true"></span>
          <span>{{ "login.submitting" | t }}</span>
        }
      </button>
    </form>

    <p class="auth__foot">
      {{ "login.footer.prompt" | t }}
      <button type="button" class="auth__foot-link" (click)="onRegister()">
        {{ "login.tabs.register" | t }}
      </button>
    </p>
  </div>
</div>
