<ds-auth-card
  [tabs]="[
    { key: 'signin', label: 'login.tabs.signin' | t },
    { key: 'register', label: 'login.tabs.register' | t },
  ]"
  activeTab="signin"
  [tagline]="'login.tagline' | t"
  (tabSelected)="onTab($event)"
>
  <form (ngSubmit)="onSubmit()">
    <ds-stack [gap]="'13px'">
      <ds-field [label]="'login.email.label' | t">
        <ds-text-input
          name="email"
          type="email"
          leadingIcon="mail"
          inputmode="email"
          autocomplete="email"
          [placeholder]="'login.email.placeholder' | t"
          [(ngModel)]="email"
          [disabled]="loading"
        />
      </ds-field>

      <ds-field [label]="'login.password.label' | t">
        <ds-text-input
          name="password"
          leadingIcon="lock"
          autocomplete="current-password"
          [passwordToggle]="true"
          [togglePasswordLabel]="'login.togglePassword.show' | t"
          [placeholder]="'login.password.placeholder' | t"
          [(ngModel)]="password"
          [disabled]="loading"
        />
      </ds-field>

      <ds-stack direction="row" justify="end">
        <ds-button variant="link" (clicked)="onForgot()">
          {{ "login.forgotPassword" | t }}
        </ds-button>
      </ds-stack>

      <ds-button
        type="submit"
        variant="primary"
        size="lg"
        [fullWidth]="true"
        [loading]="loading"
        [trailingIcon]="loading ? undefined : 'arrowRight'"
      >
        {{ (loading ? "login.submitting" : "login.submit") | t }}
      </ds-button>
    </ds-stack>
  </form>
</ds-auth-card>
