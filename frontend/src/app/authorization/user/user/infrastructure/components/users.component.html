<ds-page-wrapper [maxWidth]="'560px'" [gap]="'0'">
  <ds-stack [gap]="'14px'">
    <ds-screen-header
      leading="back"
      [leadingLabel]="'users.back' | t"
      [eyebrow]="'users.eyebrow' | t"
      [title]="'users.title' | t"
      (leadingClick)="back()"
    >
      <ds-chip slot="actions" tone="brand-solid" [uppercase]="true">{{
        "users.adminOnly" | t
      }}</ds-chip>
    </ds-screen-header>

    @if (loading()) {
      <ds-stack [gap]="'14px'">
        <ds-skeleton height="72px"></ds-skeleton>
        <ds-skeleton height="76px"></ds-skeleton>
        <ds-skeleton height="76px"></ds-skeleton>
        <ds-skeleton height="76px"></ds-skeleton>
      </ds-stack>
    } @else {
      <ds-stack [gap]="'22px'">
        <ds-stack direction="row" [gap]="'10px'">
          <ds-metric-card
            [value]="total()"
            [label]="'users.summary.requests' | t"
          ></ds-metric-card>
          <ds-metric-card
            [value]="verifiedCount()"
            [label]="'users.summary.verified' | t"
          ></ds-metric-card>
          <ds-metric-card
            variant="feature"
            [value]="activeCount()"
            [label]="'users.summary.withAccess' | t"
          ></ds-metric-card>
        </ds-stack>

        <ds-stack [gap]="'10px'">
          <ds-text variant="label">{{ "users.section.requests" | t }}</ds-text>

          @if (rows().length === 0) {
            <ds-empty-state
              icon="users"
              [title]="'users.empty.title' | t"
              [text]="'users.empty.text' | t"
            ></ds-empty-state>
          } @else {
            @for (row of rows(); track row.id) {
              <ds-user-access-row
                [initial]="row.initial"
                [name]="row.name"
                [email]="row.email"
                [verified]="row.verified"
                [verifiedLabel]="'users.badge.verified' | t"
                [unverifiedLabel]="'users.badge.unverified' | t"
                [active]="row.active"
                [activeLabel]="'users.access.active' | t"
                [inactiveLabel]="'users.access.inactive' | t"
                [disabled]="row.saving"
                [ariaLabel]="'users.access.toggleAria' | t"
                (toggled)="onToggle(row)"
              ></ds-user-access-row>
            }
          }
        </ds-stack>

        <ds-note icon="info">{{ "users.note" | t }}</ds-note>
      </ds-stack>
    }
  </ds-stack>
</ds-page-wrapper>
