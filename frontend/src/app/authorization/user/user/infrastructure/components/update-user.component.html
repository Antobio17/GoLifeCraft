<ds-page-wrapper [maxWidth]="'960px'" [gap]="'24px'">
  <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
    <ds-section-page-wrapper
      [title]="'updateUser.title' | t"
      [description]="'updateUser.description' | t"
      [loading]="loading()"
      [skeletonRows]="3"
      [skeletonFieldsPerRow]="2"
      [showBackButton]="true"
      [icon]="'users'"
      (backClicked)="cancel()"
    >
      <ds-form-section
        [title]="'updateUser.section.personal' | t"
        [icon]="ICONS['USERS']"
      >
        <ds-form-row>
          <ds-form-input
            [label]="'updateUser.field.username' | t"
            formControlName="username"
          ></ds-form-input>
          <ds-form-input
            [label]="'updateUser.field.email' | t"
            type="email"
            formControlName="email"
          ></ds-form-input>
        </ds-form-row>
        <ds-form-row>
          <ds-form-input
            [label]="'updateUser.field.name' | t"
            formControlName="name"
          ></ds-form-input>
          <ds-form-input
            [label]="'updateUser.field.lastname' | t"
            formControlName="lastname"
          ></ds-form-input>
        </ds-form-row>
      </ds-form-section>

      <ds-form-section
        [title]="'updateUser.section.status' | t"
        [icon]="ICONS['SETTINGS']"
      >
        <ds-field [label]="'updateUser.field.isActive' | t">
          <ds-stack direction="row" align="center" [gap]="'12px'">
            <ds-toggle-switch
              formControlName="isActive"
              [ariaLabel]="'updateUser.field.isActive' | t"
            />
            <ds-text variant="strong">
              {{
                userForm.get("isActive")?.value
                  ? ("updateUser.field.active" | t)
                  : ("updateUser.field.inactive" | t)
              }}
            </ds-text>
          </ds-stack>
        </ds-field>

        <ds-field [label]="'updateUser.field.role' | t" [required]="true">
          <ds-role-picker formControlName="role" [options]="roleOptions()" />
        </ds-field>
      </ds-form-section>
    </ds-section-page-wrapper>

    <ds-form-actions
      [cancelLabel]="'updateUser.cancel' | t"
      [submitLabel]="'updateUser.save' | t"
      [savingLabel]="'updateUser.saving' | t"
      [saving]="saving()"
      [formInvalid]="userForm.invalid"
      [icon]="'save'"
      (cancelled)="cancel()"
    ></ds-form-actions>
  </form>
</ds-page-wrapper>
