<ds-page-wrapper [maxWidth]="'960px'" [gap]="'24px'">
  <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
    <ds-section-page-wrapper
      [title]="'createUser.title' | t"
      [description]="'createUser.description' | t"
      [loading]="loading()"
      [skeletonRows]="3"
      [skeletonFieldsPerRow]="2"
      [showBackButton]="true"
      [icon]="'users'"
      (backClicked)="cancel()"
    >
      <ds-form-section
        [title]="'createUser.section.personal' | t"
        [icon]="ICONS['USERS']"
      >
        <ds-form-row>
          <ds-form-input
            [label]="'createUser.field.username' | t"
            formControlName="username"
          ></ds-form-input>
          <ds-form-input
            [label]="'createUser.field.email' | t"
            type="email"
            formControlName="email"
          ></ds-form-input>
        </ds-form-row>
        <ds-form-row>
          <ds-form-input
            [label]="'createUser.field.name' | t"
            formControlName="name"
          ></ds-form-input>
          <ds-form-input
            [label]="'createUser.field.lastname' | t"
            formControlName="lastname"
          ></ds-form-input>
        </ds-form-row>
      </ds-form-section>

      <ds-form-section
        [title]="'createUser.section.security' | t"
        [icon]="ICONS['SETTINGS']"
      >
        <ds-form-row>
          <ds-form-input
            type="password"
            [label]="'createUser.field.password' | t"
            [showRequired]="true"
            formControlName="password"
            [errorMessages]="{
              required: 'createUser.validation.passwordRequired',
              minlength: 'createUser.validation.passwordMinLength',
            }"
          ></ds-form-input>

          <ds-stack [gap]="'4px'">
            <ds-form-input
              type="password"
              [label]="'createUser.field.confirmPassword' | t"
              [showRequired]="true"
              formControlName="confirmPassword"
              [errorMessages]="{
                required: 'createUser.validation.confirmPasswordRequired',
              }"
            ></ds-form-input>
            @if (
              userForm.errors?.["passwordMismatch"] &&
              userForm.get("confirmPassword")?.touched &&
              !userForm.get("confirmPassword")?.errors?.["required"]
            ) {
              <ds-text variant="danger">
                {{ "createUser.validation.passwordMismatch" | t }}
              </ds-text>
            }
          </ds-stack>
        </ds-form-row>
      </ds-form-section>

      <ds-form-section
        [title]="'createUser.section.role' | t"
        [icon]="ICONS['USERS']"
      >
        <ds-field [label]="'createUser.field.role' | t" [required]="true">
          <ds-role-picker formControlName="role" [options]="roleOptions()" />
        </ds-field>
      </ds-form-section>
    </ds-section-page-wrapper>

    <ds-form-actions
      [cancelLabel]="'createUser.cancel' | t"
      [submitLabel]="'createUser.save' | t"
      [savingLabel]="'createUser.saving' | t"
      [saving]="saving()"
      [formInvalid]="userForm.invalid"
      [icon]="'users'"
      (cancelled)="cancel()"
    ></ds-form-actions>
  </form>
</ds-page-wrapper>
