<ds-page-wrapper>
  @if (loading()) {
    <ds-skeleton-page-header [showAction]="true"></ds-skeleton-page-header>
  }

  @if (!loading()) {
    <ds-page-header
      [title]="'getUsers.title' | t"
      [subtitle]="'getUsers.subtitle' | t"
    >
      <ds-button
        slot="actions"
        variant="primary"
        size="lg"
        icon="plus"
        (clicked)="onCreateUser()"
      >
        {{ "getUsers.newUser" | t }}
      </ds-button>
    </ds-page-header>
  }

  <ds-list-filters
    [fields]="filterFields"
    [loading]="loading()"
    (filtersApplied)="onFiltersApplied($event)"
    (filtersCleared)="onFiltersCleared()"
  />

  <ds-list-table
    [items]="items()"
    [columns]="columns"
    [actions]="actions"
    [loading]="loading()"
    [emptyTitle]="'getUsers.table.emptyTitle' | t"
    [emptyMessage]="'getUsers.table.emptyMessage' | t"
    (actionClick)="onAction($event)"
  />

  @if (!loading() && items().length > 0) {
    <ds-pagination
      [currentPage]="currentPage()"
      [pageSize]="pageSize()"
      [totalItems]="totalItems()"
      itemsName="pagination.users"
      (pageChange)="goToPage($event)"
      (pageSizeChange)="onPageSizeChange($event)"
    />
  }
</ds-page-wrapper>

<ds-confirm-action-modal
  [show]="showDeleteModal()"
  [title]="'getUsers.deleteModal.title' | t"
  [body]="'getUsers.deleteModal.body' | t"
  [itemName]="userToDelete()?.attributes?.username ?? ''"
  [warningText]="'getUsers.deleteModal.warning' | t"
  [isDeleting]="isDeleting()"
  [cancelLabel]="'getUsers.deleteModal.cancel' | t"
  [confirmLabel]="'getUsers.deleteModal.confirm' | t"
  [deletingLabel]="'getUsers.deleteModal.deleting' | t"
  (confirmed)="onConfirmDelete()"
  (cancelled)="onCancelDelete()"
/>
