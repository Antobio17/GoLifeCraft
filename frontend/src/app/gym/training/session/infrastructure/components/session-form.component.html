<ds-page-wrapper [maxWidth]="'640px'" [gap]="'22px'">
  <ds-screen-header
    [leading]="'close'"
    [leadingLabel]="'createSession.back' | t"
    [title]="title"
    (leadingClick)="cancel()"
  />

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <ds-stack [gap]="'22px'">
      <ds-field [label]="'createSession.field.name' | t">
        <ds-text-input
          variant="outlined"
          formControlName="name"
          [placeholder]="'createSession.field.namePlaceholder' | t"
        />
      </ds-field>

      <ds-field [label]="'createSession.field.duration' | t">
        <ds-choice-chips
          [options]="estOptions"
          formControlName="estimatedDurationMinutes"
        />
      </ds-field>

      <ds-button
        type="submit"
        [fullWidth]="true"
        [loading]="saving()"
        [disabled]="saving()"
      >
        {{ saving() ? ("createSession.saving" | t) : saveLabel }}
      </ds-button>
    </ds-stack>
  </form>
</ds-page-wrapper>
