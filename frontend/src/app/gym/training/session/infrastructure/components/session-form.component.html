<ds-page-wrapper [maxWidth]="'640px'" [gap]="'22px'">
  <ds-screen-header
    [leading]="'close'"
    [leadingLabel]="'createSession.back' | t"
    [title]="title"
    (leadingClick)="cancel()"
  />

  <form class="gym-form" [formGroup]="form" (ngSubmit)="onSubmit()">
    <ds-field [label]="'createSession.field.name' | t">
      <input
        class="gym-input"
        type="text"
        formControlName="name"
        [placeholder]="'createSession.field.namePlaceholder' | t"
        [class.is-invalid]="
          form.get('name')?.invalid && form.get('name')?.touched
        "
      />
    </ds-field>

    <ds-field [label]="'createSession.field.duration' | t">
      <ds-choice-chips
        [options]="estOptions"
        formControlName="estimatedDurationMinutes"
      ></ds-choice-chips>
    </ds-field>

    <button type="submit" class="gym-cta" [disabled]="saving()">
      {{ saving() ? ("createSession.saving" | t) : saveLabel }}
    </button>
  </form>
</ds-page-wrapper>
