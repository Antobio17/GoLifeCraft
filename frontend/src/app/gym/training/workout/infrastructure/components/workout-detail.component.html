<ds-page-wrapper [maxWidth]="'680px'" [gap]="'12px'">
  @if (loading()) {
    <ds-skeleton height="120px" />
  } @else if (workout(); as detail) {
    <ds-screen-header
      [leading]="'back'"
      [leadingLabel]="'getWorkout.back' | t"
      [eyebrow]="'getWorkout.eyebrow' | t"
      [title]="detail.sessionName"
      (leadingClick)="goBack()"
    />

    <ds-workout-summary
      [eyebrow]="'getWorkout.completed' | t"
      [date]="dateText(detail.startedAt)"
      [stats]="[
        {
          value: durationText(detail.durationSeconds),
          label: 'getWorkout.duration' | t,
        },
        {
          value: ratioLabel(detail),
          label: 'getWorkout.sets' | t,
          accent: true,
        },
      ]"
    />

    <ds-stack [gap]="'9px'">
      @for (exercise of detail.exercises; track exercise.id; let i = $index) {
        <ds-workout-exercise
          [index]="i + 1"
          [name]="exercise.exerciseName"
          [muscle]="muscleText(exercise)"
          [ratio]="exerciseRatio(exercise)"
          [note]="exercise.note"
          [sets]="exercise.sets"
          [numLabel]="'getWorkout.set.number' | t"
          [repsLabel]="'getWorkout.set.reps' | t"
          [weightLabel]="'getWorkout.set.weight' | t"
        />
      }
    </ds-stack>
  }
</ds-page-wrapper>
