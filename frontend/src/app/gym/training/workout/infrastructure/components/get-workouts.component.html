<ds-page-wrapper [gap]="'12px'">
  <ds-screen-header
    [leading]="'back'"
    [leadingLabel]="'getWorkouts.back' | t"
    [eyebrow]="'getWorkouts.eyebrow' | t"
    [title]="'getWorkouts.heading' | t"
    [subtitle]="headerSubtitle()"
    (leadingClick)="goBack()"
  />

  @if (loading()) {
    <ds-grid [minColumn]="'260px'" [gap]="'9px'" [tabletColumns]="2">
      @for (i of [1, 2, 3]; track i) {
        <ds-skeleton />
      }
    </ds-grid>
  } @else if (items().length === 0) {
    <ds-empty-state
      icon="history"
      [title]="'getWorkouts.empty.title' | t"
      [text]="'getWorkouts.empty.text' | t"
    />
  } @else {
    <ds-grid [minColumn]="'260px'" [gap]="'9px'" [tabletColumns]="2">
      @for (workout of rows(); track workout.id) {
        <ds-card
          [interactive]="true"
          [padding]="'13px'"
          [gap]="'11px'"
          (activated)="onOpen(workout.id)"
        >
          <ds-stack
            direction="row"
            align="start"
            justify="between"
            [gap]="'8px'"
          >
            <ds-stack [gap]="'2px'">
              <ds-heading [level]="3" size="md">
                {{ workout.sessionName }}
              </ds-heading>
              <ds-text variant="meta">
                {{ workout.dateLabel }}
              </ds-text>
            </ds-stack>

            <ds-chip tone="brand">
              <ds-stack direction="row" align="center" [gap]="'5px'">
                <ds-icon name="check" [size]="12" [stroke]="3" />
                {{ workout.ratioLabel }}
              </ds-stack>
            </ds-chip>
          </ds-stack>

          <ds-progress-bar [value]="workout.progressPercent" />

          <ds-stack direction="row" [gap]="'14px'" [wrap]="true">
            <ds-meta-item icon="clock">
              {{ workout.durationLabel }}
            </ds-meta-item>
            <ds-meta-item icon="dumbbell">
              {{ workout.exercisesLabel }}
            </ds-meta-item>
          </ds-stack>
        </ds-card>
      }
    </ds-grid>
  }
</ds-page-wrapper>
