<ds-page-wrapper [maxWidth]="'640px'" [gap]="'22px'">
  <ds-screen-header
    [leading]="'close'"
    [leadingLabel]="'createExercise.back' | t"
    [title]="title"
    (leadingClick)="cancel()"
  />

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <ds-stack [gap]="'22px'">
      <ds-field [label]="'createExercise.field.name' | t">
        <ds-text-input
          variant="outlined"
          formControlName="name"
          [placeholder]="'createExercise.field.namePlaceholder' | t"
        />
      </ds-field>

      <ds-field
        [label]="'createExercise.field.muscleGroups' | t"
        [count]="form.get('muscleGroups')?.value?.length ?? 0"
      >
        <ds-muscle-picker
          [groups]="muscleGroups"
          formControlName="muscleGroups"
        />
      </ds-field>

      <ds-field
        [label]="'createExercise.field.type' | t"
        [hint]="modeHint"
        [hintIcon]="true"
      >
        <ds-segmented-toggle [options]="typeOptions" formControlName="type" />
      </ds-field>

      <ds-button
        type="submit"
        [fullWidth]="true"
        [loading]="saving()"
        [disabled]="saving()"
      >
        {{ saving() ? ("createExercise.saving" | t) : saveLabel }}
      </ds-button>
    </ds-stack>
  </form>
</ds-page-wrapper>
