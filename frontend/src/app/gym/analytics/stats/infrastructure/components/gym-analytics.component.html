<ds-stack [gap]="'10px'">
  <ds-section-header
    [title]="'dashboard.gym.title' | t"
    [actionLabel]="'dashboard.gym.seeAll' | t"
    (action)="seeAll.emit()"
  />

  @if (loading()) {
    <ds-stack [gap]="'12px'">
      <ds-skeleton height="66px" />
      <ds-skeleton height="150px" />
    </ds-stack>
  } @else if (!hasData) {
    <ds-text variant="muted">{{ "dashboard.gym.empty" | t }}</ds-text>
  } @else {
    <ds-stack direction="row" [gap]="'8px'">
      <ds-stat-tile
        [value]="stats()!.totalSessions"
        [label]="'dashboard.gym.sessions' | t"
      />
      <ds-stat-tile
        [value]="totalVolumeText"
        unit="kg"
        [label]="'dashboard.gym.volume' | t"
      />
      <ds-stat-tile
        [value]="stats()!.totalExercises"
        [label]="'dashboard.gym.exercises' | t"
      />
    </ds-stack>

    <ds-panel
      [title]="'dashboard.gym.volumeChart.title' | t"
      [subtitle]="'dashboard.gym.volumeChart.subtitle' | t"
      [figure]="totalVolumeText + ' kg'"
    >
      <ds-bar-chart
        [bars]="volumeBars"
        [showValues]="false"
        chartHeight="108px"
      />
    </ds-panel>

    <ds-grid [minColumn]="'240px'" [gap]="'10px'">
      <ds-panel
        [brand]="true"
        [title]="'dashboard.gym.progression.title' | t"
        [subtitle]="'dashboard.gym.progression.subtitle' | t"
      >
        @if (progressionDelta) {
          <ds-trend-badge
            slot="aside"
            [positive]="progressionDelta.positive"
            [label]="progressionDelta.label"
          />
        }
        @if (hasProgression) {
          <ds-line-chart class="panel__spark" [points]="progressionPoints" />
        } @else {
          <ds-text variant="meta" [inherit]="true">
            {{ "dashboard.gym.progression.empty" | t }}
          </ds-text>
        }
      </ds-panel>

      <ds-panel
        [title]="'dashboard.gym.muscles.title' | t"
        [subtitle]="'dashboard.gym.muscles.subtitle' | t"
      >
        <ds-stack class="muscles" [gap]="'12px'">
          @for (region of regionShares; track region.region) {
            <ds-meter
              [label]="region.region"
              [percent]="region.percent"
              [color]="regionColor(region.index)"
            />
          }
        </ds-stack>
      </ds-panel>
    </ds-grid>
  }
</ds-stack>
