<div class="toggle-container">
  <label class="toggle-switch" [class.toggle-switch--sm]="size === 'sm'">
    <input
      type="checkbox"
      class="toggle-input"
      [checked]="value"
      [disabled]="disabled"
      (change)="onCheckboxChange($event)"
      (blur)="onTouched()"
    />
    <span class="toggle-slider"></span>
  </label>
  @if (activeLabel || inactiveLabel) {
    <span class="toggle-label" [class.active]="value">
      {{ value ? activeLabel : inactiveLabel }}
    </span>
  }
</div>
