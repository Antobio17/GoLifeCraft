<app-page-wrapper>
  @if (loading()) {
    <app-skeleton-page-header [showAction]="false"></app-skeleton-page-header>
  }

  @if (!loading()) {
    <app-page-header
      icon="history"
      iconTone="amber"
      [eyebrow]="'domainEventLog.eyebrow' | t"
      [title]="'domainEventLog.title' | t"
      [subtitle]="'domainEventLog.subtitle' | t"
      [stats]="[
        {
          icon: 'history',
          label: ('domainEventLog.headerStats.events' | t),
          value: totalLogs(),
          tone: 'amber',
        },
      ]"
    />
  }

  <div class="list-card">
    <app-list-filters
      [fields]="filterFields"
      [loading]="loading()"
      [loadingFields]="3"
      (filtersApplied)="onFiltersApplied($event)"
      (filtersCleared)="onFiltersCleared()"
    />

    <app-list-table
      [items]="logs()"
      [columns]="columns"
      [actions]="actions"
      [loading]="loading()"
      [canWrite]="false"
      [emptyTitle]="'domainEventLog.table.emptyTitle' | t"
      [emptyMessage]="'domainEventLog.table.emptyMessage' | t"
      (actionClick)="onAction($event)"
    />

    @if (!loading() && logs().length > 0) {
      <app-pagination
        [currentPage]="currentPage()"
        [pageSize]="pageSize()"
        [totalItems]="totalLogs()"
        itemsName="pagination.logs"
        (pageChange)="goToPage($event)"
        (pageSizeChange)="onPageSizeChange($event)"
      />
    }
  </div>
</app-page-wrapper>
