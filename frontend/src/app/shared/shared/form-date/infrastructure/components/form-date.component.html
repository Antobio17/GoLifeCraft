<div class="form-group" [class.is-focused]="isFocused">
  @if (finalConfig.label) {
    <label class="form-label">
      {{ finalConfig.label }}
      @if (finalConfig.required) {
        <span class="required-indicator">*</span>
      }
    </label>
  }

  <div class="date-wrapper">
    <input
      type="date"
      [value]="value || ''"
      [disabled]="disabled"
      [readonly]="finalConfig.readonly || false"
      [required]="finalConfig.required || false"
      [attr.min]="finalConfig.min"
      [attr.max]="finalConfig.max"
      (input)="onInputChange($event)"
      (blur)="onBlur()"
      (focus)="onFocus()"
      class="form-control"
      [class.is-invalid]="isInvalid"
    />

    @if (isClearable) {
      <button
        type="button"
        class="clear-button"
        (click)="clear()"
        [attr.aria-label]="'formDate.clear' | t"
      >
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <use href="assets/icons/golifecraft/sprite.svg#i-x"></use>
        </svg>
      </button>
    }
  </div>

  @if (hint && !isInvalid) {
    <small class="form-hint">{{ hint }}</small>
  }

  @if (isInvalid) {
    <div class="error-message">
      <svg
        width="14"
        height="14"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.75"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <use href="assets/icons/golifecraft/sprite.svg#i-alert"></use>
      </svg>
      <small>{{ firstError || "" | t: firstErrorParams }}</small>
    </div>
  }
</div>
