<header class="section-title">
  <app-icon-chip [tone]="iconTone" size="md">
    <svg
      class="section-title__icon"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="1.75"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      <use [attr.href]="'assets/icons/golifecraft/sprite.svg#i-' + icon"></use>
    </svg>
  </app-icon-chip>
  <div class="section-title__text">
    <h2 class="section-title__heading">
      {{ title }}
      @if (counter !== undefined) {
        <span class="section-title__counter">{{ counter }}</span>
      }
    </h2>
    @if (subtitle) {
      <p class="section-title__subtitle">{{ subtitle }}</p>
    }
  </div>
</header>
