<label
  class="checkbox-wrapper"
  [class.checked]="checked"
  [class.disabled]="disabled"
>
  <input
    type="checkbox"
    [checked]="checked"
    [disabled]="disabled"
    class="checkbox-input"
    (change)="onNativeChange($event)"
  />
  <span class="checkbox-custom"></span>
  @if (label) {
    <span class="checkbox-label-text">{{ label }}</span>
  }
</label>
