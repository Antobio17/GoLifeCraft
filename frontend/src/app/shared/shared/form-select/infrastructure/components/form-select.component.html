<div class="form-group" [class.is-focused]="isFocused">
  @if (finalConfig.label) {
    <label class="form-label">
      {{ finalConfig.label }}
      @if (finalConfig.required) {
        <span class="required-indicator">*</span>
      }
    </label>
  }

  <select
    [ngModel]="value"
    [required]="finalConfig.required || false"
    [disabled]="disabled"
    (ngModelChange)="onSelectChange($event)"
    (blur)="onBlur()"
    (focus)="onFocus()"
    class="form-control"
    [class.is-invalid]="isInvalid"
  >
    @if (!hideEmptyOption) {
      <option [value]="''">
        {{ finalConfig.placeholder || ("formSelect.placeholder" | t) }}
      </option>
    }
    @for (option of finalOptions; track option.value) {
      <option
        [value]="getOptionValue(option)"
        [disabled]="option.disabled || false"
      >
        {{
          optionLabelPrefix
            ? (optionLabelPrefix + option.value | t)
            : (option.label | t)
        }}
      </option>
    }
  </select>

  @if (hint && !isInvalid) {
    <small class="form-hint">
      {{ hint }}
    </small>
  }

  @if (isInvalid) {
    <div class="error-message">
      <svg
        width="14"
        height="14"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.75"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <use href="assets/icons/golifecraft/sprite.svg#i-alert"></use>
      </svg>
      <small>{{ firstError || "" | t }}</small>
    </div>
  }
</div>
