@for (toast of toasts; track toast.id) {
  <ds-toast
    [@toastSlide]
    [type]="toast.type"
    [icon]="toast.icon"
    [title]="toast.keyTranslation | t: asParams(toast.details)"
    [subtitle]="
      toast.subtitleTranslation
        ? (toast.subtitleTranslation | t: asParams(toast.details))
        : ''
    "
    [durationMs]="toast.durationMs"
    [closeLabel]="'floatingToast.close' | t"
    (dismissed)="dismiss()"
  />
}
