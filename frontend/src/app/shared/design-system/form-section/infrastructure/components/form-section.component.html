<div
  class="form-section"
  [class.form-section--headerless]="
    !sectionConfig.title && !sectionConfig.icon && !sectionConfig.iconName
  "
>
  @if (sectionConfig.title || sectionConfig.icon || sectionConfig.iconName) {
    <div
      class="section-header"
      [class.collapsible]="sectionConfig.collapsible"
      [attr.role]="sectionConfig.collapsible ? 'button' : null"
      [attr.tabindex]="sectionConfig.collapsible ? 0 : null"
      (click)="toggleCollapse()"
      (keydown.enter)="toggleCollapse()"
    >
      <h4 class="section-title">
        @if (sectionConfig.iconName) {
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <use
              [attr.href]="
                'assets/icons/golifecraft/sprite.svg#i-' +
                sectionConfig.iconName
              "
            ></use>
          </svg>
        } @else if (sectionConfig.icon) {
          <svg
            [attr.width]="sectionConfig.icon.width"
            [attr.height]="sectionConfig.icon.height"
            [attr.viewBox]="sectionConfig.icon.viewBox"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            @for (path of sectionConfig.icon.paths; track path) {
              <path [attr.d]="path" />
            }
          </svg>
        }
        {{ sectionConfig.title }}
      </h4>

      @if (sectionConfig.collapsible) {
        <svg
          class="collapse-icon"
          [class.collapsed]="isCollapsed"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <use href="assets/icons/golifecraft/sprite.svg#i-chevron-down"></use>
        </svg>
      }
    </div>
  }

  <div class="section-content" [class.collapsed]="isCollapsed">
    <ng-content></ng-content>
  </div>
</div>
