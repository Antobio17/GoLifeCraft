<div #sentinel class="active-banner__sentinel" aria-hidden="true"></div>

<div
  class="active-banner"
  [class.active-banner--collapsed]="scrolled"
  [class.active-banner--paused]="paused"
>
  <div class="active-banner__row">
    <span class="active-banner__pulse"></span>
    <div class="active-banner__info">
      <span class="active-banner__state">{{ stateLabel }}</span>
      <span class="active-banner__time">{{ elapsedLabel }}</span>
    </div>
    <div class="active-banner__count">
      <span class="active-banner__count-value"
        >{{ doneCount }}/{{ totalSets }}</span
      >
      <span class="active-banner__count-label">{{ setsLabel }}</span>
    </div>
    <div class="active-banner__compact-actions">
      <button
        type="button"
        class="active-banner__compact-btn active-banner__compact-btn--finish"
        [disabled]="finishing"
        [attr.tabindex]="scrolled ? null : -1"
        [attr.aria-hidden]="scrolled ? null : 'true'"
        [attr.aria-label]="finishAriaLabel"
        (click)="finished.emit()"
      >
        <ds-icon name="check" [size]="15" [stroke]="3" />
      </button>
      <button
        type="button"
        class="active-banner__compact-btn active-banner__compact-btn--soft"
        [attr.tabindex]="scrolled ? null : -1"
        [attr.aria-hidden]="scrolled ? null : 'true'"
        [attr.aria-label]="pauseAriaLabel"
        (click)="pauseToggle.emit()"
      >
        <ds-icon [name]="paused ? 'play' : 'pause'" [size]="15" />
      </button>
      <button
        type="button"
        class="active-banner__compact-btn active-banner__compact-btn--stop"
        [attr.tabindex]="scrolled ? null : -1"
        [attr.aria-hidden]="scrolled ? null : 'true'"
        [attr.aria-label]="stopAriaLabel"
        (click)="stopped.emit()"
      >
        <ds-icon name="square" [size]="13" />
      </button>
    </div>
  </div>

  <div class="active-banner__actions">
    <button
      type="button"
      class="active-banner__finish"
      [disabled]="finishing"
      [attr.tabindex]="scrolled ? -1 : null"
      [attr.aria-hidden]="scrolled ? 'true' : null"
      (click)="finished.emit()"
    >
      <ds-icon name="check" [size]="17" [stroke]="3" />
      {{ finishLabel }}
    </button>
    <div class="active-banner__actions-row">
      <button
        type="button"
        class="active-banner__btn active-banner__btn--soft"
        [attr.tabindex]="scrolled ? -1 : null"
        [attr.aria-hidden]="scrolled ? 'true' : null"
        (click)="pauseToggle.emit()"
      >
        <ds-icon [name]="paused ? 'play' : 'pause'" [size]="15" />
        {{ paused ? resumeLabel : pauseLabel }}
      </button>
      <button
        type="button"
        class="active-banner__btn active-banner__btn--stop"
        [attr.tabindex]="scrolled ? -1 : null"
        [attr.aria-hidden]="scrolled ? 'true' : null"
        (click)="stopped.emit()"
      >
        <ds-icon name="square" [size]="14" />
        {{ stopLabel }}
      </button>
    </div>
  </div>
</div>
