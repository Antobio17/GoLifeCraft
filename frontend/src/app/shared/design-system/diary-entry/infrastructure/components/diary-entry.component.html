<ds-swipe-to-delete
  #swipe
  [disabled]="!canWrite"
  [reveal]="66"
  [radius]="14"
  [removeLabel]="removeLabel"
  (remove)="remove.emit()"
>
  <ds-stack
    class="diary-entry__row"
    direction="row"
    align="center"
    gap="11px"
    [class.diary-entry__row--slid]="swipe.slid"
  >
    @if (openable) {
      <ds-pressable
        [grow]="true"
        [ariaLabel]="openLabel"
        (press)="opened.emit()"
      >
        <ds-emoji-tile [emoji]="emoji" [size]="38" [radius]="10" />

        <ds-stack gap="4px" [grow]="true">
          <ds-text variant="strong" class="diary-entry__name">{{
            name
          }}</ds-text>
          <ds-stack direction="row" align="center" gap="7px">
            <ds-chip [tone]="badgeTone">{{ badge }}</ds-chip>
            <ds-text variant="meta" [inline]="true" class="diary-entry__kcal">{{
              kcalLabel
            }}</ds-text>
          </ds-stack>
        </ds-stack>
      </ds-pressable>
    } @else {
      <ds-emoji-tile [emoji]="emoji" [size]="38" [radius]="10" />

      <ds-stack gap="4px" [grow]="true">
        <ds-text variant="strong" class="diary-entry__name">{{ name }}</ds-text>
        <ds-stack direction="row" align="center" gap="7px">
          <ds-chip [tone]="badgeTone">{{ badge }}</ds-chip>
          <ds-text variant="meta" [inline]="true" class="diary-entry__kcal">{{
            kcalLabel
          }}</ds-text>
        </ds-stack>
      </ds-stack>
    }

    @if (canWrite) {
      <ds-inline-quantity
        [quantity]="quantity"
        [unit]="unit"
        [ariaLabel]="quantityAriaLabel"
        (quantityChange)="quantityChange.emit($event)"
      />
    } @else {
      <ds-text class="diary-entry__qty">{{ quantityLabel }}</ds-text>
    }
  </ds-stack>
</ds-swipe-to-delete>
