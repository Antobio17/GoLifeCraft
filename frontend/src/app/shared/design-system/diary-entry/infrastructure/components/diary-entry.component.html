<ds-swipe-to-delete
  #swipe
  [disabled]="!canWrite"
  [reveal]="66"
  [radius]="14"
  [removeLabel]="removeLabel"
  (remove)="remove.emit()"
>
  <div class="diary-entry__row" [class.diary-entry__row--slid]="swipe.slid">
    <ds-emoji-tile [emoji]="emoji" [size]="38" [radius]="10" />

    <div class="diary-entry__body">
      <span class="diary-entry__name">{{ name }}</span>
      <div class="diary-entry__meta">
        <ds-chip [tone]="badgeTone">{{ badge }}</ds-chip>
        <span class="diary-entry__kcal">{{ kcalLabel }}</span>
      </div>
    </div>

    @if (canWrite) {
      <div class="diary-entry__qty-box">
        <input
          class="diary-entry__qty-input"
          type="text"
          inputmode="decimal"
          [value]="quantity"
          [attr.aria-label]="quantityAriaLabel"
          (input)="onQtyInput($event)"
        />
        <span class="diary-entry__qty-unit">{{ unit }}</span>
      </div>
    } @else {
      <span class="diary-entry__qty">{{ quantityLabel }}</span>
    }
  </div>
</ds-swipe-to-delete>
