<button
  class="theme-toggle-btn"
  type="button"
  [attr.title]="isDark() ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
  [attr.aria-label]="
    isDark() ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'
  "
  (click)="toggle()"
>
  @if (isDark()) {
    <svg
      width="18"
      height="18"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="1.75"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      <use href="assets/icons/golifecraft/sprite.svg#i-light-mode"></use>
    </svg>
  } @else {
    <svg
      width="18"
      height="18"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="1.75"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      <use href="assets/icons/golifecraft/sprite.svg#i-dark-mode"></use>
    </svg>
  }
</button>
