<ds-page-wrapper [maxWidth]="'720px'" [gap]="'24px'">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <ds-section-page-wrapper
      [title]="'createSupermarket.title' | t"
      [description]="'createSupermarket.description' | t"
      [loading]="loading()"
      [skeletonRows]="1"
      [skeletonFieldsPerRow]="1"
      [showBackButton]="true"
      [icon]="'category'"
      (backClicked)="cancel()"
    >
      <ds-form-section
        [title]="'createSupermarket.section.general' | t"
        [icon]="ICONS['BUILDING']"
      >
        <ds-form-input
          [label]="'createSupermarket.field.name' | t"
          [showRequired]="true"
          formControlName="name"
        ></ds-form-input>
      </ds-form-section>
    </ds-section-page-wrapper>

    <ds-form-actions
      [cancelLabel]="'createSupermarket.cancel' | t"
      [submitLabel]="'createSupermarket.save' | t"
      [savingLabel]="'createSupermarket.saving' | t"
      [saving]="saving()"
      [formInvalid]="form.invalid"
      (cancelled)="cancel()"
    ></ds-form-actions>
  </form>
</ds-page-wrapper>
