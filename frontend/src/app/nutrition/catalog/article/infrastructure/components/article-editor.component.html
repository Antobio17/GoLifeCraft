<ds-page-wrapper [maxWidth]="'640px'" [gap]="'20px'">
  <ds-screen-header
    [leading]="'close'"
    [leadingLabel]="'articleEditor.back' | t"
    [eyebrow]="'articleEditor.eyebrow' | t"
    [title]="title"
    (leadingClick)="cancel()"
  />

  @if (loading()) {
    <ds-skeleton height="88px" />
    <ds-skeleton height="120px" />
    <ds-skeleton height="180px" />
  } @else {
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <ds-stack [gap]="'20px'">
        <ds-stack direction="row" align="end" [gap]="'12px'">
          <ds-field [label]="'articleEditor.field.icon' | t">
            <ds-emoji-picker
              formControlName="emoji"
              [groups]="emojiGroups"
              [fallback]="fallbackEmoji"
              [sheetTitle]="'articleEditor.field.emojiSheetTitle' | t"
              [closeLabel]="'articleEditor.field.emojiClose' | t"
              [triggerLabel]="'articleEditor.field.emojiTrigger' | t"
              [searchPlaceholder]="'articleEditor.field.emojiSearch' | t"
              [emptyLabel]="'articleEditor.field.emojiEmpty' | t"
            />
          </ds-field>
          <ds-field
            [grow]="true"
            [label]="'articleEditor.field.name' | t"
            [required]="true"
          >
            <ds-text-input
              variant="outlined"
              formControlName="name"
              [placeholder]="'articleEditor.field.namePlaceholder' | t"
            />
          </ds-field>
        </ds-stack>

        <ds-stack direction="row" align="end" [gap]="'12px'">
          <ds-field [grow]="true" [label]="'articleEditor.field.brand' | t">
            <ds-text-input
              variant="outlined"
              formControlName="brand"
              [placeholder]="'articleEditor.field.brandPlaceholder' | t"
            />
          </ds-field>

          <ds-field [width]="'128px'" [label]="'articleEditor.field.price' | t">
            <ds-price-input formControlName="price" />
          </ds-field>
        </ds-stack>

        <ds-field [label]="'articleEditor.field.category' | t">
          <ds-select-chips
            formControlName="categoryId"
            [options]="categoryOptions()"
          />
        </ds-field>

        <ds-field [label]="'articleEditor.field.store' | t">
          <ds-select-chips
            formControlName="supermarketId"
            [options]="supermarketOptions()"
          />
        </ds-field>

        <ds-nutrition-editor
          [title]="'articleEditor.nutrition.heading' | t"
          [badge]="'articleEditor.nutrition.reference' | t"
        >
          <ds-nutrient-input
            variant="energy"
            icon="flame"
            unit="kcal"
            formControlName="calories"
            [label]="'articleEditor.nutrition.energy' | t"
          />
          <ds-nutrient-input
            formControlName="protein"
            [label]="'articleEditor.nutrition.protein' | t"
          />
          <ds-nutrient-input
            formControlName="fat"
            [label]="'articleEditor.nutrition.fat' | t"
          />
          <ds-nutrient-input
            variant="sub"
            formControlName="saturatedFat"
            [label]="'articleEditor.nutrition.saturatedFat' | t"
          />
          <ds-nutrient-input
            formControlName="carbs"
            [label]="'articleEditor.nutrition.carbs' | t"
          />
          <ds-nutrient-input
            variant="sub"
            formControlName="sugars"
            [label]="'articleEditor.nutrition.sugars' | t"
          />
          <ds-nutrient-input
            [last]="true"
            formControlName="salt"
            [label]="'articleEditor.nutrition.salt' | t"
          />
        </ds-nutrition-editor>

        <ds-button
          type="submit"
          [fullWidth]="true"
          [loading]="saving()"
          [disabled]="saving()"
        >
          {{ saving() ? ("articleEditor.saving" | t) : saveLabel }}
        </ds-button>

        @if (isEdit) {
          <ds-button
            type="button"
            variant="outline-danger"
            [fullWidth]="true"
            icon="trash"
            (clicked)="onDelete()"
          >
            {{ "articleEditor.delete" | t }}
          </ds-button>
        }
      </ds-stack>
    </form>
  }
</ds-page-wrapper>

<ds-confirm-action-modal
  [show]="showDeleteModal()"
  [title]="'articleEditor.deleteModal.title' | t"
  [body]="'articleEditor.deleteModal.body' | t"
  [itemName]="articleName()"
  [warningText]="'articleEditor.deleteModal.warning' | t"
  [isDeleting]="deleting()"
  [cancelLabel]="'articleEditor.deleteModal.cancel' | t"
  [confirmLabel]="'articleEditor.deleteModal.confirm' | t"
  [deletingLabel]="'articleEditor.deleteModal.deleting' | t"
  (confirmed)="onConfirmDelete()"
  (cancelled)="onCancelDelete()"
/>
