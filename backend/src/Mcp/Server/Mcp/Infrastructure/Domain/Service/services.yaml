services:
  Mcp\Server\Mcp\Infrastructure\Domain\Service\McpResourceRegistry:
    class: Mcp\Server\Mcp\Infrastructure\Domain\Service\McpResourceRegistry
    arguments:
      $resources: '%mcp.resources%'

  Mcp\Server\Mcp\Infrastructure\Domain\Service\Sidecar\YamlSidecarReader:
    class: Mcp\Server\Mcp\Infrastructure\Domain\Service\Sidecar\YamlSidecarReader

  Mcp\Server\Mcp\Domain\Service\ModelMetadataProvider:
    class: Mcp\Server\Mcp\Infrastructure\Domain\Service\Doctrine\DoctrineModelMetadataProvider
    arguments:
      $registry: '@Mcp\Server\Mcp\Infrastructure\Domain\Service\McpResourceRegistry'
      $sidecarReader: '@Mcp\Server\Mcp\Infrastructure\Domain\Service\Sidecar\YamlSidecarReader'
      $entityManager: '@doctrine.orm.tenant_manager_entity_manager'

  Mcp\Server\Mcp\Domain\Service\ModelReadQuery:
    class: Mcp\Server\Mcp\Infrastructure\Domain\Service\Doctrine\DoctrineModelReadQuery
    arguments:
      $entityManager: '@doctrine.orm.tenant_manager_entity_manager'

  Mcp\Server\Mcp\Domain\Service\ModelValidator:
    class: Mcp\Server\Mcp\Domain\Service\ModelValidator
    arguments:
      $existsNeedleDataQuery: '@Mcp\Server\Mcp\Domain\QueryModel\ModelExistsNeedleDataQuery'

  Mcp\Server\Mcp\Domain\Service\ModelHydrator:
    class: Mcp\Server\Mcp\Domain\Service\ModelHydrator
    arguments:
      $repository: '@Mcp\Server\Mcp\Domain\Model\GenericModelRepository'

  Mcp\Server\Mcp\Domain\Service\ModelPermissionChecker:
    class: Mcp\Server\Mcp\Domain\Service\ModelPermissionChecker

  Mcp\Server\Mcp\Infrastructure\Domain\Service\OAuth\AuthorizationCodeStore:
    class: Mcp\Server\Mcp\Infrastructure\Domain\Service\OAuth\AuthorizationCodeStore
    arguments:
      $cache: '@cache.app'
      $ttl: 300

  Mcp\Server\Mcp\Infrastructure\Domain\Service\Security\McpTokenAuthenticator:
    class: Mcp\Server\Mcp\Infrastructure\Domain\Service\Security\McpTokenAuthenticator
    arguments:
      $jwtEncoder: '@Lexik\Bundle\JWTAuthenticationBundle\Encoder\JWTEncoderInterface'
      $tenantUserProvider: '@Authorization\User\User\Infrastructure\Domain\Service\Security\TenantUserProvider'

  Mcp\Server\Mcp\Infrastructure\Domain\Service\Security\McpAuthenticationEntryPoint:
    class: Mcp\Server\Mcp\Infrastructure\Domain\Service\Security\McpAuthenticationEntryPoint
