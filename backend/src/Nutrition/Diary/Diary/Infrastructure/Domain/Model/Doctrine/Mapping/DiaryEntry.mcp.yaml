label: Diary entry

fields:
  entryDate:
    writable: true
    required: true
    min: 10
    max: 10
    regex: '^\d{4}-\d{2}-\d{2}$'
    description: >-
      The calendar day the food is logged to, as an ISO date "YYYY-MM-DD".
      Use the user's local date; default to today when not specified.
    filterable: true
    sortable: true
  meal:
    writable: true
    required: true
    enum: [breakfast, lunch, dinner, snack]
    description: >-
      The meal slot the entry belongs to: "breakfast", "lunch", "dinner" or "snack".
      Pick the slot that best fits the time or the food.
    filterable: true
  kind:
    writable: true
    required: true
    enum: [product, recipe, quick]
    description: >-
      Whether this entry references a catalog article ("product", quantity in grams),
      a recipe ("recipe", quantity in servings) or nothing at all ("quick", a free
      entry typed by hand, quantity in units). Use "quick" for one-off foods that are
      not worth creating an article or a recipe for.
    filterable: true
  refId:
    writable: true
    required: false
    max: 36
    description: >-
      The id of the referenced entity: an Article id when kind is "product",
      or a Recipe id when kind is "recipe". Leave it null when kind is "quick".
    filterable: true
  quantity:
    writable: true
    required: true
    type: float
    min: 0
    description: >-
      Grams of the article when kind is "product", number of servings of the
      recipe when kind is "recipe", or number of units when kind is "quick".
  quickName:
    writable: true
    required: false
    max: 255
    description: >-
      Name of the free entry, only when kind is "quick" (for example "Menú del día").
  quickEmoji:
    writable: true
    required: false
    max: 16
    description: >-
      Emoji shown for the free entry, only when kind is "quick". Pick one that fits
      the food; defaults to a pencil when empty.
  quickCalories:
    writable: true
    required: false
    type: float
    min: 0
    description: >-
      Calories of ONE unit of the free entry, only when kind is "quick". The totals
      stored in the diary are this value multiplied by "quantity".
  quickProtein:
    writable: true
    required: false
    type: float
    min: 0
    description: Grams of protein per unit of the free entry, only when kind is "quick". Optional.
  quickFat:
    writable: true
    required: false
    type: float
    min: 0
    description: Grams of fat per unit of the free entry, only when kind is "quick". Optional.
  quickCarbs:
    writable: true
    required: false
    type: float
    min: 0
    description: Grams of carbs per unit of the free entry, only when kind is "quick". Optional.

relations: {}
