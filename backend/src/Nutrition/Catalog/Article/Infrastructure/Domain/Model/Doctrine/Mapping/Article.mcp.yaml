label: Article

fields:
  name:
    writable: true
    required: true
    min: 2
    max: 255
    unique: true
    filterable: true
    sortable: true
  recipeUnit:
    writable: true
    required: true
    enum: [gram, milliliter, unit]
    filterable: true
    sortable: true
  servingSize:
    writable: true
    type: float
    min: 0
    filterable: true
    sortable: true
    description: >-
      Weight in grams (or amount in the article's recipe unit) of a single serving/portion.
      Used to show per-serving nutrition and as the default quantity when the article is added to a recipe.
  price:
    writable: true
    type: float
    min: 0
    filterable: true
    sortable: true
  brand:
    writable: true
    max: 120
    filterable: true
    sortable: true
  emoji:
    writable: true
    max: 16
    description: >-
      A single emoji that best represents the food product, based on its name and category.
      Always set exactly one emoji when creating or updating an article; do not leave it empty.
      Prefer the most specific food emoji available. Guidance by category:
      dairy/eggs 🥛🧀🧈🥚; fruit 🍎🍌🍊🍇🍓🍍🥝; vegetables 🥦🥕🍅🥬🥔🥑;
      meat/fish 🍗🥩🥓🍤🐟; cereals/bread 🌾🥣🍞🍚🍝; legumes/nuts 🥜🌰🫘;
      snacks/sweets 🍫🍪🍩🍬🍯; drinks 💧🥤🧃☕🍵; prepared meals 🍕🍔🥪🥗🥘;
      supplements/protein 💪; canned/other 🥫🧂. If nothing fits, use 🍽️.
  categoryId:
    writable: true
    min: 36
    max: 36
    filterable: true
  supermarketId:
    writable: true
    min: 36
    max: 36
    filterable: true
  nutritionFactsId:
    writable: true
    min: 36
    max: 36
    filterable: true

relations: {}
