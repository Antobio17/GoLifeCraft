security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    providers:
        tenant_user:
            id: Authorization\User\User\Infrastructure\Domain\Service\Security\TenantUserProvider
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        api_login:
            pattern:  ^/api/login
            stateless: true
            provider: tenant_user
            user_checker: Authorization\User\User\Infrastructure\Domain\Service\Security\ActiveUserChecker
            custom_authenticators:
                - Authorization\User\User\Infrastructure\Domain\Service\Security\TenantUserAuthenticator
            login_throttling:
                max_attempts: 5
                interval: '5 minutes'
        mcp:
            pattern:   ^/_mcp
            stateless: true
            provider: tenant_user
            entry_point: Integration\Mcp\OAuth\Infrastructure\Domain\Service\Security\McpAuthenticationEntryPoint
            custom_authenticators:
                - Integration\Mcp\OAuth\Infrastructure\Domain\Service\Security\McpTokenAuthenticator
        api:
            pattern:   ^/api
            stateless: true
            provider: tenant_user
            custom_authenticators:
                - Authorization\User\User\Infrastructure\Domain\Service\Security\TenantTokenAuthenticator

    access_control:
        - { path: ^/api/login, roles: IS_AUTHENTICATED_ANONYMOUSLY }
        - { path: ^/api/token/refresh, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/csp-report, roles: PUBLIC_ACCESS }
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/verify-email, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/authorization/password-reset-requests, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/authorization/password-resets, roles: PUBLIC_ACCESS }
        - { path: '^/\.well-known', roles: PUBLIC_ACCESS }
        - { path: ^/oauth, roles: PUBLIC_ACCESS }
        - { path: ^/_mcp, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }
